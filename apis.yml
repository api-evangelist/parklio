aid: parklio
name: Parklio
description: >-
  Seamlessly integrate your existing systems or products with Parklio API so you can
  scale your operations and monitor parking space usage in real time. It provides
  access to your data in a way that works best for you, whether through integration,
  automation, or full customization. The API is RESTful with JSON responses, and
  Android and iOS SDKs are available on request.
